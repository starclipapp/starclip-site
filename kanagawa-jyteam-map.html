let markers = [];
const markerGroup = L.layerGroup().addTo(map);

function getShortName(name) {
    // Remove common prefixes/suffixes to get meaningful abbreviation
    let s = name
        .replace(/^FC\s*/i, '').replace(/^JFC\s*/i, '')
        .replace(/ジュニアユース$/,'').replace(/\s*JY$/i,'')
        .replace(/\s*SC$/i,'').replace(/\s*FC$/i,'')
        .trim();
    if (s.length === 0) s = name;
    // Take up to 4 chars, split into 2 rows of 2
    const chars = [...s];
    const row1 = chars.slice(0, 2).join('');
    const row2 = chars.slice(2, 4).join('');
    return [row1, row2];
}

function createMarker(t) {
    const [name, url, lat, lng, area, cat] = t;
    const colorClass = cat === 'girls' ? 'girls' : cat === 'tokyo' ? 'tokyo' : '';
    const [row1, row2] = getShortName(name);
    const html = row2
        ? `<div class="custom-marker ${colorClass}">${row1}<br>${row2}</div>`
        : `<div class="custom-marker ${colorClass}">${row1}</div>`;
    const icon = L.divIcon({
        className: '',
        html: html,
        iconSize: [32, 28],
        iconAnchor: [16, 14]
    });
    const marker = L.marker([lat, lng], {icon}).bindPopup(`
        <div class="team-popup">
            <h3>${name}</h3>
            <div class="area">📍 ${area}</div>
            ${url !== '#' ? `<a href="${url}" target="_blank">🌐 公式サイト →</a>` : ''}
        </div>
    `);
    marker._teamData = {name, area, cat};
    return marker;
}

function renderMarkers(filter, search) {
    markerGroup.clearLayers();
    let count = 0;
    teams.forEach(t => {
        const [name,,,,area,cat] = t;
        if (filter !== 'all' && cat !== filter) return;
        if (search && !name.toLowerCase().includes(search) && !area.includes(search)) return;
        markerGroup.addLayer(createMarker(t));
        count++;
    });
    document.getElementById('teamCount').innerHTML = `<strong>${count}</strong> チームを表示中`;
}

renderMarkers('all', '');

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderMarkers(btn.dataset.filter, document.getElementById('searchInput').value.toLowerCase());
    });
});

// Search
document.getElementById('searchInput').addEventListener('input', (e) => {
    const active = document.querySelector('.filter-btn.active').dataset.filter;
    renderMarkers(active, e.target.value.toLowerCase());
});
</script>
