let markers = [];
const markerGroup = L.layerGroup().addTo(map);

function getShortName(name) {
    // Remove common prefixes to get a meaningful 4-char abbreviation
    let s = name.replace(/^FC\s*/i, '').replace(/^JFC\s*/i, '').replace(/ジュニアユース$/,'').replace(/\s*JY$/i,'').replace(/\s*SC$/i,'');
    if (s.length === 0) s = name;
    // Take up to 4 chars
    return s.substring(0, 4);
}

function createMarker(t) {
    const [name, url, lat, lng, area, cat] = t;
    const colorClass = cat === 'girls' ? 'girls' : cat === 'tokyo' ? 'tokyo' : '';
    const short = getShortName(name);
    // Split into 2x2 grid: top row (chars 0-1), bottom row (chars 2-3)
    const c = [...short];
    const top = (c[0]||'') + (c[1]||'');
    const bot = (c[2]||'') + (c[3]||'');
    const icon = L.divIcon({
        className: '',
        html: `<div class="custom-marker ${colorClass}"><span>${top}</span><span>${bot}</span></div>`,
        iconSize: [36, 36],
        iconAnchor: [18, 18]
    });
    const marker = L.marker([lat, lng], {icon}).bindPopup(`
        <div class="team-popup">
            <h3>${name}</h3>
            <div class="area">📍 ${area}</div>
            ${url !== '#' ? `<a href="${url}" target="_blank">🌐 公式サイト →</a>` : ''}
        </div>
    `);
    marker._teamData = {name, area, cat};
    return marker;
}

function renderMarkers(filter, search) {
    markerGroup.clearLayers();
    let count = 0;
    teams.forEach(t => {
        const [name,,,,area,cat] = t;
        if (filter !== 'all' && cat !== filter) return;
        if (search && !name.toLowerCase().includes(search) && !area.includes(search)) return;
        markerGroup.addLayer(createMarker(t));
        count++;
    });
    document.getElementById('teamCount').innerHTML = `<strong>${count}</strong> チームを表示中`;
}

renderMarkers('all', '');

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderMarkers(btn.dataset.filter, document.getElementById('searchInput').value.toLowerCase());
    });
});

// Search
document.getElementById('searchInput').addEventListener('input', (e) => {
    const active = document.querySelector('.filter-btn.active').dataset.filter;
    renderMarkers(active, e.target.value.toLowerCase());
});
</script>
